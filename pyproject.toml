# 行知阁 Python 项目统一配置
# 适用: 八字色彩引擎、工具脚本、数据处理

[tool.black]
line-length = 100
target-version = ['py312']
include = '\.pyi?$'
extend-exclude = '''
/(
    \.git
  | \.venv
  | venv
  | __pycache__
  | build
  | dist
  | backup
  | archive
)/
'''

[tool.isort]
profile = "black"
line_length = 100
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true
skip_gitignore = true

# 导入分组顺序: 标准库 → 第三方 → 本地
known_first_party = ["wuxing_sphere"]
sections = ["FUTURE", "STDLIB", "THIRDPARTY", "FIRSTPARTY", "LOCALFOLDER"]

[tool.pytest.ini_options]
minversion = "7.0"
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_functions = ["test_*"]
addopts = [
    "-v",
    "--strict-markers",
    "--tb=short",
    "--color=yes",
]

# 八字色彩回归测试标记
markers = [
    "regression: 回归测试 (梓涵八字 #001 一致性检查)",
    "slow: 运行时间 > 1s 的测试",
    "data: 依赖 JSON 数据文件的测试",
]

[tool.coverage.run]
source = ["."]
omit = [
    "*/tests/*",
    "*/backup*/*",
    "*/archive/*",
    "*/__pycache__/*",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if __name__ == .__main__.:",
    "raise NotImplementedError",
]

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false  # 科学计算项目允许渐进式类型注解
check_untyped_defs = true
